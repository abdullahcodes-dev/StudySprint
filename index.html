<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>StudySprint</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <header>
            <img src="assets/images/logo.png" alt="StudySprint Logo">

            <h1>StudySprint</h1>
        </header>

        <main>

            <section>
                <h2>Welcome back!</h2>

                <p>
                    Plan your day. Stay consistent.
                </p>
            </section>

            <section>
                <form>

                    <input
                        type="text"
                        placeholder="Enter today's task">

                    <button>
                        + Add Task
                    </button>

                </form>
            </section>

            <section>

                <h2>Today's Progress</h2>

                <p>0 / 3 Tasks Completed</p>

                <progress value="0" max="3"></progress>

            </section>

            <section>

                <h2>Today's Tasks</h2>

                <ul>

                    <li>Task 1</li>
                    <li>Task 2</li>
                    <li>Task 3</li>
                    <li>Task 4</li>

                </ul>

            </section>

        </main>

        <footer>

            <p>StudySprint © 2026</p>

            <p>Built with ❤️ by Muhammad Abdullah</p>

        </footer>

    </div>

</body>

</html>
